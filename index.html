<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- Configuração de acentos -->
  <meta charset="UTF-8">

  <!-- Responsividade -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título da aba -->
  <title>Agro Forte</title>

  <!-- Conexão com CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Cabeçalho -->
  <header>

    <h1>Agro Forte, Futuro Sustentável</h1>

    <p>
      Tecnologia, inovação e sustentabilidade no campo.
    </p>

    <!-- Botão modo escuro -->
    <button onclick="modoEscuro()">
      🌙 Modo Escuro
    </button>

  </header>

  <!-- Conteúdo principal -->
  <section class="conteudo">

    <h2>Tecnologias Sustentáveis no Agro</h2>

    <p>
      A tecnologia ajuda o agronegócio a produzir mais alimentos,
      reduzir desperdícios e preservar o meio ambiente.
    </p>

  </section>

  <!-- Galeria de imagens -->
  <section class="galeria">

    <img src="imagens/agro1.jpg" alt="Trator em plantação verde">

    <img src="imagens/agro2.jpg" alt="Trator trabalhando ao pôr do sol">

    <img src="imagens/agro3.jpg" alt="Tecnologia agrícola sustentável">

  </section>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
